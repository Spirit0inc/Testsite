<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Neural Ice Flow - Super Visuality</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            overflow: hidden; 
            background: #000205; 
            font-family: sans-serif;
            /* Убираем возможность выделения текста, чтобы не мешало кликам */
            user-select: none;
        }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height, centerX, centerY;
        let isClicking = false;
        const neurons = [];

        // --- ТВОИ НАСТРОЙКИ (БЕЗ ИЗМЕНЕНИЙ) ---
        const N_COUNT = 160; 
        const CONNECT_DIST = 100; 
        const MAX_CONNECTIONS_PER_NODE = 4; 
        const FRICTION = 0.985;
        const HOME_STRENGTH = 0.0003;
        const SPIRAL_FORCE = 0.002;
        const MOUSE_PUSH = 0.001;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
            initNeurons();
        }

        class Neuron {
            constructor(bx, by) {
                this.baseX = bx;
                this.baseY = by;
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.radius = Math.random() * 1.8 + 1.2; // Чуть выразительнее размер
                // Более сочные цвета
                this.color = Math.random() > 0.5 ? '#00e5ff' : '#651fff';
                this.pulse = Math.random() * Math.PI * 2;
            }

            update(mx, my) {
                this.vx += (this.baseX - this.x) * HOME_STRENGTH;
                this.vy += (this.baseY - this.y) * HOME_STRENGTH;

                if (mx !== null) {
                    const dx = this.x - mx;
                    const dy = this.y - my;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    const effectRadius = 80;

                    if (isClicking) {
                        if (dist < 400) {
                            const pull = 0.008;
                            this.vx -= dx * pull;
                            this.vy -= dy * pull;
                            const speed = SPIRAL_FORCE * (150 / (dist + 30));
                            this.vx += dy * speed;
                            this.vy -= dx * speed;
                        }
                    } else if (dist < effectRadius) {
                        const f = (1 - dist / effectRadius) * MOUSE_PUSH;
                        this.vx += dx * f;
                        this.vy += dy * f;
                    }
                }

                this.x += this.vx;
                this.y += this.vy;
                this.vx *= FRICTION;
                this.vy *= FRICTION;

                if (this.x < 0 || this.x > width) this.vx *= -1;
                if (this.y < 0 || this.y > height) this.vy *= -1;
                
                this.pulse += 0.05; // Скорость "дыхания" нейрона
            }

            draw() {
                const glow = Math.sin(this.pulse) * 2 + 3;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                
                // Добавляем микро-свечение только самой точке (не тормозит FPS)
                ctx.fill();
            }
        }

        function initNeurons() {
            neurons.length = 0;
            for (let i = 0; i < N_COUNT; i++) {
                const angle = Math.random() * Math.PI * 2;
                const rX = Math.random() * 250;
                const rY = Math.random() * 180;
                const side = Math.random() > 0.5 ? 1 : -1;
                const bx = centerX + (Math.cos(angle) * rX) + (side * 80);
                const by = centerY + (Math.sin(angle) * rY);
                neurons.push(new Neuron(bx, by));
            }
        }

        let mx = null, my = null;
        window.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
        window.addEventListener('mousedown', () => isClicking = true);
        window.addEventListener('mouseup', () => isClicking = false);
        window.addEventListener('resize', resize);

        function animate() {
            // Эффект "накопления" света (цвета становятся глубже)
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = 'rgba(0, 2, 5, 0.15)';
            ctx.fillRect(0, 0, width, height);

            // Режим наложения для свечения линий
            ctx.globalCompositeOperation = 'screen';

            for (let i = 0; i < neurons.length; i++) {
                let connections = 0;
                for (let j = i + 1; j < neurons.length; j++) {
                    if (connections >= MAX_CONNECTIONS_PER_NODE) break;

                    const n1 = neurons[i];
                    const n2 = neurons[j];
                    const dx = n1.x - n2.x;
                    const dy = n1.y - n2.y;
                    const distSq = dx*dx + dy*dy;

                    if (distSq < CONNECT_DIST * CONNECT_DIST) {
                        const dist = Math.sqrt(distSq);
                        const alpha = (1 - dist / CONNECT_DIST) * 0.4;
                        
                        // Создаем градиент для каждой линии для "залипательности"
                        const gradient = ctx.createLinearGradient(n1.x, n1.y, n2.x, n2.y);
                        gradient.addColorStop(0, n1.color);
                        gradient.addColorStop(1, n2.color);

                        ctx.strokeStyle = gradient;
                        ctx.globalAlpha = alpha;
                        ctx.lineWidth = 0.8;
                        ctx.beginPath();
                        ctx.moveTo(n1.x, n1.y);
                        ctx.lineTo(n2.x, n2.y);
                        ctx.stroke();
                        connections++;
                    }
                }
            }
            
            ctx.globalAlpha = 1;

            neurons.forEach(n => {
                n.update(mx, my);
                n.draw();
            });

            requestAnimationFrame(animate);
        }

        resize();
        animate();
    </script>
</body>
</html>
